<!-- ===================================================== -->
<!--  HALLZ TO THE WALLZ | GLOBAL HEADER & NAVBAR         -->
<!--  Copy this entire block into every page              -->
<!--  Update the "active" class depending on the page     -->
<!-- ===================================================== -->

<header>

<link rel="stylesheet" href="assets/css/bootstrap.min.css">
<link rel="stylesheet" href="assets/css/custom.css">

  <!-- ================= NAVIGATION BAR ================== -->
  <!--
       - Dark background for strong contrast
       - Sticky so it stays visible while scrolling
       - Fully responsive with Bootstrap collapse
  -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">

    <div class="container">

      <!-- ================= BRAND / LOGO ================= -->
      <!--
           Clicking the logo always returns to Home
           Keep logo small and clean
      -->
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <img 
          src="assets/img/logo.jpg" 
          alt="Hallz to the Wallz Logo" 
          width="40" 
          height="40" 
          class="rounded"
        >
        <span class="fw-semibold">Hallz to the Wallz LLC</span>
      </a>

      <!-- ============== MOBILE TOGGLE BUTTON ============= -->
      <!--
           This appears on smaller screens
           It toggles the collapsed navigation menu
      -->
      <button 
        class="navbar-toggler" 
        type="button" 
        data-bs-toggle="collapse" 
        data-bs-target="#mainNav"
        aria-controls="mainNav"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- ================ NAVIGATION LINKS =============== -->
      <!--
           The "active" class highlights the current page
           IMPORTANT: Change which link has "active"
      -->
      <div class="collapse navbar-collapse" id="mainNav">

        <ul class="navbar-nav ms-auto align-items-lg-center">

          <!-- Home -->
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>

          <!-- Services -->
          <li class="nav-item">
            <a class="nav-link" href="services.html">Services</a>
          </li>

          <!-- About -->
          <li class="nav-item">
            <a class="nav-link active" href="about.html">About</a>
          </li>

          <!-- Contact -->
          <li class="nav-item">
            <a class="nav-link" href="contact.html">Contact</a>
          </li>

          <!-- Call To Action Button -->
          <!--
               Stands out from normal nav links
               Encourages quote requests
          -->
          <li class="nav-item ms-lg-3">
            <a class="btn btn-warning fw-semibold" href="contact.html">
              Request a Quote
            </a>
          </li>

        </ul>

      </div>
      <!-- ============== END NAVIGATION LINKS ============= -->

    </div>
  </nav>
  <!-- ================= END NAVIGATION BAR =============== -->

</header>

<!-- ===================================================== -->
<!--  END GLOBAL HEADER                                   -->
<!-- ===================================================== -->
